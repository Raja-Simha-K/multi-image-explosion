<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Loader 2</title>
	<style>
		*{margin: 0;padding: 0;box-sizing: border-box;}
		body{font-family: "Inter", sans-serif;}
		.container{padding: 0 24px}
		.loader{width: 100%;height: 100vh;background: #ffffff;display: flex;align-items: center;justify-content: center;position: fixed;left: 0;top: 0;z-index: 999}
		.loader-wrap {width: 30%;aspect-ratio: 16/9;overflow: hidden;margin: auto;position: relative;}
		.loader-wrap .swipe-img-card{position: relative;width: 100%;height: 100%;}
		.loader-wrap .swipe-img-wrap{width: 100%;height: 100%;position: absolute;left: 0;bottom: 0;clip-path: inset(0% 0% 100% 0%);}
		.loader-wrap .swipe-img-wrap img{width: 100%;height: 105%;object-fit: cover;object-position: center;top: -5%;}

		.hero-a{width: 100%;height: 100vh;padding: 50px 0;color: #fff}
		.hero-a .hero-img-wrap{background-size: cover;background-position: center -5%;}
		.hero-a .hero-img-wrap{width: 30%;aspect-ratio: 16/9;position: absolute;left: 50%;top: 50%;transform: translate(-50%,-50%);}
		.hero-a .hero-img-wrap .hero-img{width: 100%;height: 100%;position: absolute;left: 0;top: 0;z-index: 1;overflow: hidden;}
		.hero-a .hero-img-wrap .hero-img img{width: 100%;height: 105%;object-fit: cover;position: absolute;left: 0;top: -5%;}
		.hero-a .container{position: relative;}
		.hero-caption {text-align: center;overflow: hidden;}
		.hero-caption h1{font-size: 14vw;letter-spacing: -0.4rem;line-height: 0.8}
	</style>
</head>
<body>
	<div class="loader">
		<div class="loader-wrap">
			<div class="swipe-img-card swipe-image-animation">
				<div class="swipe-img-wrap"><img src="images/image-3.jpg" alt=""></div>
				<div class="swipe-img-wrap"><img src="images/image-5.png" alt=""></div>
				<div class="swipe-img-wrap"><img src="images/image-2.jpg" alt=""></div>
				<div class="swipe-img-wrap"><img src="images/image-6.jpg" alt=""></div>
				<div class="swipe-img-wrap"><img src="images/image-4.png" alt=""></div>
				<div class="swipe-img-wrap"><img src="images/image-1.jpg" alt=""></div>
			</div>
		</div>
	</div>
	<section class="hero-a">
		<div class="hero-img-wrap" style="background-image: url(images/image-1.jpg);">
			<div class="hero-img" >
				<img src="images/image-1.jpg" alt="">
			</div>	
			<div class="hero-img" >
				<img src="images/image-3.jpg" alt="">
			</div>
			<div class="hero-img" >
				<img src="images/image-5.png" alt="">
			</div>
			<div class="hero-img" >
				<img src="images/image-2.jpg" alt="">
			</div>
			<div class="hero-img" >
				<img src="images/image-6.jpg" alt="">
			</div>
			<div class="hero-img" >
				<img src="images/image-4.png" alt="">
			</div>
		</div>
		<div class="container">
			<div class="hero-caption">
				<h1>THIS IS SIMHA</h1>	
			</div>
		</div>
	</section>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<script src="https://unpkg.com/split-type"></script>

<script>
	const items = document.querySelectorAll(".swipe-img-wrap");
	const bannerWrap = document.querySelector(".hero-img-wrap");
	const bannerImage = document.querySelectorAll(".hero-img");
	const bannerImageEach = document.querySelectorAll(".hero-img img");

	
	const tl = gsap.timeline({
		ease: "power4.inOut",
	});
	
	tl.to(items[0], {
		clipPath: "inset(0% 0% 0% 0%)",
		duration: 1,
		ease: "circ.inOut",
	});
	
	const imgs = Array.from(items).slice(1);
	let delay = 1; 
	let gap = 0.5; 
	const decay = 0.75; 
	imgs.forEach((el, i) => {
		tl.to(el, {
			clipPath: "inset(0% 0% 0% 0%)",
			duration: 1.2,
			ease: "circ.inOut"
		}, delay);

		delay += gap; 
		gap *= decay; 
	});
	tl.set(Array.from(bannerImage).slice(1), {
		clipPath: "inset(0% 0% 100% 0%)",
		display: "none",
	});
	
	tl.to(".loader", {
		opacity: 0,
		duration: 0.5,
		ease: "circ.inOut",
		onComplete: () => {
			document.querySelector(".loader").style.display = "none";
		}
	});
	
	tl.to(bannerWrap, {
		width: "100%",
		height: "100vh",
		aspectRatio: "unset",
		duration: 0.6,
		ease: "circ.inOut"
	});

	
	
	const tlTwo = gsap.timeline({
		repeat: -1
	});

	let zIndexCounter = 1;

	tlTwo.fromTo(bannerImage,
		{
			clipPath: "inset(0 0% 100% 0%)"
		},
		{
			clipPath: "inset(0% 0% 0% 0%)",
			duration: 1,
			ease: "circ.inOut",
			stagger: {
				each: 4,
				onStart: function () {
					const el = this.targets()[0];
					const img = el.querySelector("img");
					gsap.set(el, {
						display: "block",
					});

					gsap.to(img, {
						top: "0%",
						duration: 6,
						ease: "linear"
					});
				},

				onComplete: function () {
					const elNew = this.targets()[0];
					const imgEl = elNew.querySelector("img");

					gsap.delayedCall(4.8, () => {
						gsap.set(el, { display: "none" });
						gsap.set(imgEl, { top: "-5%",});
					});
				}
			}
		}
	);


	
	const split = new SplitType('.hero-caption h1', {
		types: 'words'
	});

	tl.from(split.words, {
		y: "100%",
		duration: 0.8,
		stagger: 0.3,
		ease: "power3.inOut"
	});


	
	const master = gsap.timeline();
	master.add(tl).add(tlTwo);

</script>

</html>
